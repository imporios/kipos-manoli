<!DOCTYPE html>
<html lang="el">
<head>
  <link rel="manifest" href="/kipos-manoli/manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2d5a27">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Κήπος Μανώλη">
<title>🌹 Ο Κήπος του Μανώλη</title>
<style>
:root{--gd:#1a3d16;--gm:#2d5a27;--gl:#4a8c42;--gp:#7bc470;--er:#8b5e3c;--el:#c4956a;--cr:#faf6f0;--wh:#ffffff;--rd:#c0392b;--gd2:rgba(212,175,55,1);--sh:rgba(0,0,0,0.18);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--gd);color:var(--cr);min-height:100vh;overflow-x:hidden}
.hdr{background:linear-gradient(135deg,var(--gd) 0%,var(--gm) 100%);padding:14px 16px 10px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 16px var(--sh);position:sticky;top:0;z-index:100;border-bottom:2px solid var(--gl)}
.hdr img{width:48px;height:48px;border-radius:11px;box-shadow:0 2px 8px var(--sh)}
.hdr h1{font-size:1.15rem;font-weight:700;color:var(--cr)}
.hdr p{font-size:0.68rem;color:var(--gp);margin-top:2px}
.main{padding:14px;max-width:600px;margin:0 auto}
.btn-add{width:100%;background:linear-gradient(135deg,var(--gl),var(--gp));color:#fff;border:none;border-radius:var(--r);padding:15px;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 14px rgba(74,140,66,0.35);margin-bottom:18px;transition:transform 0.15s}
.btn-add:active{transform:scale(0.97)}
.empty{text-align:center;padding:46px 20px;color:var(--gp);opacity:.7}
.empty .ei{font-size:3.5rem;margin-bottom:12px}
.card{background:linear-gradient(160deg,rgba(45,90,39,0.85),rgba(26,61,22,0.9));border:1px solid rgba(123,196,112,0.25);border-radius:var(--r);margin-bottom:14px;box-shadow:0 4px 18px var(--sh);overflow:hidden}
.card-hdr{display:flex;align-items:center;padding:13px 14px;gap:11px;cursor:pointer;user-select:none}
.pi{font-size:1.9rem}.nw{flex:1}
.pn{font-size:1.05rem;font-weight:700;color:var(--cr)}
.pt{display:inline-block;background:rgba(74,140,66,0.4);color:var(--gp);border-radius:20px;padding:2px 9px;font-size:0.68rem;margin-top:3px}
.xb{color:var(--gp);font-size:1.2rem;transition:transform 0.3s;padding:4px}
.xb.open{transform:rotate(180deg)}
.del-btn{background:rgba(192,57,43,0.2);color:#e74c3c;border:1px solid rgba(192,57,43,0.3);border-radius:8px;padding:5px 9px;cursor:pointer;font-size:0.75rem;font-weight:600}
.card-body{display:none;padding:0 13px 13px;border-top:1px solid rgba(123,196,112,0.15)}
.card-body.open{display:block}
.agrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin:11px 0 7px}
.ab{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:var(--rs);color:var(--cr);padding:9px 5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:0.7rem;font-weight:600;transition:background .2s,transform .1s}
.ab:active{transform:scale(0.94)}
.ab .ai{font-size:1.35rem}
.ab.w{border-color:rgba(52,152,219,.5);color:#7ec8e3}
.ab.p{border-color:rgba(46,204,113,.5);color:#7dcea0}
.ab.pr{border-color:rgba(230,126,34,.5);color:#f0b27a}
.ab.sp{border-color:rgba(155,89,182,.5);color:#c39bd3}
.ab.d{border-color:rgba(139,94,60,.5);color:var(--el)}
.ab.n{border-color:rgba(212,175,55,.5);color:var(--gd2)}
.logs h4{font-size:0.75rem;color:var(--gp);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;margin-top:9px}
.log{background:rgba(0,0,0,.25);border-radius:9px;padding:9px 11px;margin-bottom:6px;font-size:0.8rem;position:relative}
.lh{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.li{font-size:1.05rem}.ll{font-weight:700;color:var(--cr);font-size:.8rem}
.ld{color:var(--gp);font-size:.7rem;margin-left:auto}
.lt{color:rgba(250,246,240,.8);font-size:.78rem;margin-top:2px;line-height:1.4}
.lphotos{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.lphoto{width:60px;height:60px;border-radius:7px;object-fit:cover;cursor:pointer}
.lrem{margin-top:4px;background:rgba(212,175,55,.12);border-left:3px solid var(--gd2);border-radius:0 5px 5px 0;padding:3px 7px;font-size:.72rem;color:var(--gd2)}
.ldel{position:absolute;top:7px;right:7px;background:none;border:none;color:rgba(231,76,60,.5);cursor:pointer;font-size:.85rem;padding:2px 4px}
.rdb{background:rgba(212,175,55,.15);border:1px solid rgba(212,175,55,.4);border-radius:20px;padding:2px 9px;font-size:.68rem;color:var(--gd2);margin-top:3px;display:inline-block}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.mo.open{display:flex}
.md{background:linear-gradient(160deg,#1e4a1a,#162e13);border:1px solid rgba(123,196,112,.3);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:600px;padding:20px 16px 28px;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px var(--sh)}
.md h2{font-size:1.1rem;color:var(--cr);margin-bottom:16px;display:flex;align-items:center;gap:9px}
.mc{margin-left:auto;background:rgba(255,255,255,.1);border:none;color:var(--cr);border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center}
.fg{margin-bottom:12px}
.fg label{display:block;color:var(--gp);font-size:.8rem;font-weight:600;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(123,196,112,.3);border-radius:var(--rs);color:var(--cr);padding:10px 12px;font-size:.88rem;outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gp)}
.fg textarea{min-height:75px;resize:vertical}
.fg select option{background:#1e4a1a;color:var(--cr)}
.pua{border:2px dashed rgba(123,196,112,.35);border-radius:var(--rs);padding:16px;text-align:center;cursor:pointer;color:var(--gp);font-size:.83rem}
.pua input{display:none}
.ppl{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.pp{width:68px;height:68px;border-radius:8px;object-fit:cover;border:2px solid rgba(123,196,112,.4)}
.rem-sec{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.25);border-radius:var(--rs);padding:11px;margin-top:9px}
.rem-sec label{color:var(--gd2) !important}
.bts{width:100%;background:linear-gradient(135deg,var(--gl),var(--gp));color:#fff;border:none;border-radius:var(--r);padding:13px;font-size:.97rem;font-weight:700;cursor:pointer;margin-top:7px;box-shadow:0 4px 12px rgba(74,140,66,.3);transition:transform .1s}
.bts:active{transform:scale(0.97)}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb img{max-width:95vw;max-height:90vh;border-radius:10px}
.lbc{position:fixed;top:14px;right:14px;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;width:38px;height:38px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--gm);color:var(--cr);border:1px solid var(--gl);border-radius:30px;padding:9px 20px;font-size:.85rem;font-weight:600;z-index:400;transition:transform .35s ease;white-space:nowrap;box-shadow:0 4px 18px var(--sh)}
.toast.show{transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--gl);border-radius:4px}
</style>
</head>

<!-- Modal: Add Plant -->
<div class="mo" id="mAdd">
<div class="md">
  <h2>🌿 Νέο Φυτό / Δέντρο <button class="mc" onclick="cm('mAdd')">✕</button></h2>
  <div class="fg"><label>Όνομα *</label><input type="text" id="npn" placeholder="π.χ. Τριανταφυλλιά, Ελιά..."></div>
  <div class="fg"><label>Τύπος</label>
    <select id="npt">
      <option value="flower">🌸 Λουλούδι</option>
      <option value="tree">🌳 Δέντρο</option>
      <option value="shrub">🌿 Θάμνος</option>
      <option value="vegetable">🥬 Λαχανικό</option>
      <option value="herb">🌾 Βότανο</option>
      <option value="fruit">🍑 Οπωροφόρο</option>
      <option value="cactus">🌵 Κάκτος</option>
      <option value="other">🪴 Άλλο</option>
    </select>
  </div>
  <div class="fg"><label>Σημειώσεις</label><textarea id="npnotes" placeholder="Περιγραφή, ποικιλία..."></textarea></div>
  <button class="bts" onclick="savePlant()">✅ Αποθήκευση</button>
</div>
</div>

<!-- Modal: Action -->
<div class="mo" id="mAct">

      <span style="font-size:1.7rem">📷</span><br>Πατήστε για φωτογραφία
      <input type="file" id="pInput" multiple accept="image/*" onchange="handlePhotos(event)">
    </div>
    <div class="ppl" id="pPreview"></div>
  </div>
  <div class="rem-sec">
    <div class="fg"><label>🔔 Υπενθύμιση (προαιρετικά)</label><input type="date" id="rDate"></div>

</div>

  <img id="lbImg" src="" alt="">
</div>
<div class="toast" id="toast"></div>

<script>
let plants=JSON.parse(localStorage.getItem('mkg')||'[]');
let curPid=null,curAtype=null,pendPics=[];
function save(){localStorage.setItem('mkg',JSON.stringify(plants));}
const ptm={flower:{i:'🌸',l:'Λουλούδι'},tree:{i:'🌳',l:'Δέντρο'},shrub:{i:'🌿',l:'Θάμνος'},vegetable:{i:'🥬',l:'Λαχανικό'},herb:{i:'🌾',l:'Βότανο'},fruit:{i:'🍑',l:'Οπωροφόρο'},cactus:{i:'🌵',l:'Κάκτος'},other:{i:'🪴',l:'Άλλο'}};
const atm={planting:{i:'🌱',l:'Φύτεμα',ph:true},watering:{i:'💧',l:'Πότισμα',ph:false},pruning:{i:'✂️',l:'Κλάδεμα',ph:false},spraying:{i:'🧴',l:'Ψεκασμός',ph:false},digging:{i:'⛏️',l:'Σκάλισμα',ph:false},notes:{i:'📝',l:'Σημειώσεις',ph:true}};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtD(d){if(!d)return'';const[y,m,day]=d.split('-');return day+'/'+m+'/'+y;}
function today(){return new Date().toISOString().slice(0,10);}
function getDue(p){const t=today();return(p.logs||[]).filter(l=>l.reminder&&l.reminder<=t);}

function init(){
  const n=new Date();
  document.getElementById('hdate').textContent=n.toLocaleDateString('el-GR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  render();checkRem();
}
function render(){
  const c=document.getElementById('plist');
  if(!plants.length){c.innerHTML='<div class="empty"><div class="ei">🌱</div><p>Ο κήπος σου είναι άδειος.<br>Πρόσθεσε το πρώτο σου φυτό!</p></div>';return;}
  c.innerHTML=plants.map(renderCard).join('');
}
function renderCard(p){
  const pt=ptm[p.type]||ptm.other;
  const due=getDue(p);
  const rb=due.length?'<div class="rdb">🔔 '+due.length+' υπενθύμιση'+(due.length>1?'εις':'')+'</div>':'';
  const logs=(p.logs&&p.logs.length)?'<div class="logs"><h4>📋 Ιστορικό ('+p.logs.length+')</h4>'+p.logs.slice().reverse().map((l,ri)=>renderLog(p.id,p.logs.length-1-ri,l)).join('')+'</div>':'<p style="color:rgba(123,196,112,.5);font-size:.78rem;margin-top:7px;">Δεν υπάρχουν καταχωρήσεις.</p>';
  return '<div class="card" id="c-'+p.id+'"><div class="card-hdr" onclick="tog(\''+p.id+'\')"><div class="pi">'+pt.i+'</div><div class="nw"><div class="pn">'+esc(p.name)+'</div><div class="pt">'+pt.l+'</div>'+rb+'</div><button class="del-btn" onclick="event.stopPropagation();delP(\''+p.id+'\')">🗑️</button><div class="xb" id="xb-'+p.id+'">▼</div></div><div class="card-body" id="cb-'+p.id+'"><div class="agrid"><button class="ab p" onclick="openAct(\''+p.id+'\',\'planting\')"><span class="ai">🌱</span>Φύτεμα</button><button class="ab w" onclick="openAct(\''+p.id+'\',\'watering\')"><span class="ai">💧</span>Πότισμα</button><button class="ab pr" onclick="openAct(\''+p.id+'\',\'pruning\')"><span class="ai">✂️</span>Κλάδεμα</button><button class="ab sp" onclick="openAct(\''+p.id+'\',\'spraying\')"><span class="ai">🧴</span>Ψεκασμός</button><button class="ab d" onclick="openAct(\''+p.id+'\',\'digging\')"><span class="ai">⛏️</span>Σκάλισμα</button><button class="ab n" onclick="openAct(\''+p.id+'\',\'notes\')"><span class="ai">📝</span>Σημειώσεις</button></div>'+logs+'</div></div>';
}
function renderLog(pid,idx,log){
  const at=atm[log.type]||{i:'📌',l:log.type};
  const photos=(log.photos&&log.photos.length)?'<div class="lphotos">'+log.photos.map(p=>'<img class="lphoto" src="'+p+'" onclick="openLb(\''+p+'\')" alt="">').join('')+'</div>':'';
  const rem=log.reminder?'<div class="lrem">🔔 Υπενθύμιση: '+fmtD(log.reminder)+(log.reminderNote?' — '+esc(log.reminderNote):'')+'</div>':'';
  return '<div class="log"><button class="ldel" onclick="delLog(\''+pid+'\','+idx+')">✕</button><div class="lh"><span class="li">'+at.i+'</span><span class="ll">'+at.l+'</span><span class="ld">'+fmtD(log.date)+'</span></div>'+(log.notes?'<div class="lt">'+esc(log.notes)+'</div>':'')+photos+rem+'</div>';
}
function tog(id){
  document.getElementById('cb-'+id).classList.toggle('open');
  document.getElementById('xb-'+id).classList.toggle('open');
}
function openAdd(){
  document.getElementById('npn').value='';
  document.getElementById('npt').value='flower';
  document.getElementById('npnotes').value='';
  document.getElementById('mAdd').classList.add('open');
}
function savePlant(){
  const name=document.getElementById('npn').value.trim();
  if(!name){toast('⚠️ Εισάγετε όνομα');return;}
  plants.unshift({id:'p'+Date.now(),name,type:document.getElementById('npt').value,notes:document.getElementById('npnotes').value.trim(),logs:[],createdAt:today()});
  save();render();cm('mAdd');toast('✅ Φυτό προστέθηκε!');
}
function delP(id){
  if(!confirm('Διαγραφή φυτού και όλων των καταχωρήσεων;'))return;
  plants=plants.filter(p=>p.id!==id);save();render();toast('🗑️ Διαγράφηκε');
}
function openAct(pid,atype){
  curPid=pid;curAtype=atype;pendPics=[];
  const at=atm[atype];
  document.getElementById('mActTitle').innerHTML=at.i+' '+at.l+' <button class="mc" onclick="cm(\'mAct\')">✕</button>';
  document.getElementById('aDate').value=today();
  document.getElementById('aNotes').value='';
  document.getElementById('rDate').value='';
  document.getElementById('rNote').value='';
  document.getElementById('pPreview').innerHTML='';
  document.getElementById('photoSec').style.display=at.ph?'block':'none';
  document.getElementById('mAct').classList.add('open');
}
function saveAction(){
  const p=plants.find(x=>x.id===curPid);if(!p)return;
  const log={id:'l'+Date.now(),type:curAtype,date:document.getElementById('aDate').value,notes:document.getElementById('aNotes').value.trim(),photos:[...pendPics]};
  const rd=document.getElementById('rDate').value;
  if(rd){log.reminder=rd;log.reminderNote=document.getElementById('rNote').value.trim();}
  p.logs.push(log);save();
  const el=document.getElementById('c-'+curPid);
  const wasOpen=el&&document.getElementById('cb-'+curPid).classList.contains('open');
  if(el)el.outerHTML=renderCard(p);
  if(wasOpen)setTimeout(()=>{document.getElementById('cb-'+curPid)?.classList.add('open');document.getElementById('xb-'+curPid)?.classList.add('open');},10);
  cm('mAct');toast('✅ Καταχωρήθηκε!');
}
function delLog(pid,idx){
  if(!confirm('Διαγραφή καταχώρησης;'))return;
  const p=plants.find(x=>x.id===pid);if(!p)return;
  p.logs.splice(idx,1);save();
  const wasOpen=document.getElementById('cb-'+pid)?.classList.contains('open');
  document.getElementById('c-'+pid).outerHTML=renderCard(p);
  if(wasOpen)setTimeout(()=>{document.getElementById('cb-'+pid)?.classList.add('open');document.getElementById('xb-'+pid)?.classList.add('open');},10);
  toast('🗑️ Διαγράφηκε');
}
function handlePhotos(e){
  Array.from(e.target.files).forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{pendPics.push(ev.target.result);const img=document.createElement('img');img.src=ev.target.result;img.className='pp';document.getElementById('pPreview').appendChild(img);};
    r.readAsDataURL(f);
  });e.target.value='';
}
function openLb(src){document.getElementById('lbImg').src=src;document.getElementById('lb').classList.add('open');}
function closeLb(){document.getElementById('lb').classList.remove('open');}
function checkRem(){const t=today();let tot=0;plants.forEach(p=>(p.logs||[]).forEach(l=>{if(l.reminder&&l.reminder<=t)tot++;}));if(tot>0)toast('🔔 '+tot+' υπενθύμιση'+(tot>1?'εις':'')+' σήμερα!',4000);}
function cm(id){document.getElementById(id).classList.remove('open');}
function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
document.querySelectorAll('.mo').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
init();
</script>
</body>
</html>
